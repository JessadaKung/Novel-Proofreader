services:
  novel-proofreader:
    build: .
    container_name: novel-proofreader
    restart: unless-stopped
    env_file:
      - .env
    environment:
      HOST: 0.0.0.0
      PORT: 8010
    ports:
      - "8010:8010"
    volumes:
      - ./chapters:/app/chapters
      - ./glossary:/app/glossary
      - ./glossary_raw:/app/glossary_raw
      - ./reports:/app/reports
